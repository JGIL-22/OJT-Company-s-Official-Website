<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | The Aura Creatives</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        aura: {
                            black: '#000000',
                            white: '#ffffff'
                        }
                    }
                }
            }
        }
    </script>
    <!-- Theme Detection for 404 Page (Self-Invoking for first paint) -->
    <script>
            (function () {
                const savedTheme = localStorage.getItem('theme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                const isLight = savedTheme === 'light' || (!savedTheme && !prefersDark);

                if (isLight) {
                    document.documentElement.classList.add('light-theme');
                    document.addEventListener('DOMContentLoaded', () => {
                        const logo = document.getElementById('error-logo');
                        const favicon = document.querySelector('link[rel="icon"]');
                        if (logo) logo.src = 'assets/images/day_logo.png';
                        if (favicon) favicon.href = 'assets/images/day_logo.png';
                        document.body.classList.replace('bg-black', 'bg-white');
                        document.body.classList.replace('text-white', 'text-black');
                    });
                } else {
                    // Night mode is default, but ensure correct logo
                    document.addEventListener('DOMContentLoaded', () => {
                        const logo = document.getElementById('error-logo');
                        if (logo) logo.src = 'assets/images/new_logo.png';
                    });
                }
            })();
    </script>
</head>

<body
    class="bg-black text-white min-h-screen flex items-center justify-center relative overflow-hidden transition-colors duration-500">
    <!-- Background Noise -->
    <div class="absolute inset-0 opacity-[0.05] pointer-events-none z-0 bg-noise-custom">
    </div>

    <div class="container mx-auto px-6 text-center relative z-10">
        <div class="mb-8 flex justify-center">
            <img id="error-logo" src="assets/images/logo.png" alt="The Aura Creatives"
                class="h-24 object-contain opacity-50 transition-all duration-500" />
        </div>

        <h1
            class="font-serif text-9xl md:text-[12rem] font-bold text-transparent bg-clip-text bg-gradient-to-b from-white to-white/10 leading-none mb-4">
            404</h1>

        <div class="h-[1px] w-24 bg-gradient-to-r from-transparent via-white/50 to-transparent mx-auto mb-8"></div>

        <h2 class="font-serif text-3xl md:text-5xl mb-6">Page Not Found</h2>
        <p class="text-white/50 text-lg mb-12 max-w-lg mx-auto font-light">
            The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
        </p>

        <a href="index.html"
            class="inline-block px-10 py-4 border border-white/20 hover:bg-white hover:text-black transition-all duration-300 font-sans text-sm font-bold tracking-widest uppercase">
            Return Home
        </a>
    </div>
</body>

</html>
